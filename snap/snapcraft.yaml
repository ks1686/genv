name: genv
base: core22
version: '{{.Version}}' # set by goreleaser
summary: Declarative package and environment manager for Linux, macOS, and WSL2.
description: |
  genv is a command-line tool to track, sync, and reproduce your software
  environment across Linux, macOS, and WSL2. Manage packages, environment
  variables, and shell configuration declaratively using a single genv.json
  file — then replay the exact same environment on any machine with one command.

  Supported package managers: brew (macOS/Linux), paru, yay (Arch AUR), snap.

  Source code: https://github.com/ks1686/genv
  Bug reports: https://github.com/ks1686/genv/issues

grade: stable
confinement: strict

website: https://github.com/ks1686/genv
source-code: https://github.com/ks1686/genv
issues: https://github.com/ks1686/genv/issues
license: MIT

apps:
  genv:
    command: bin/genv
    plugs:
      - home
      - network

parts:
  genv:
    plugin: go
    source: .
    go-importpath: github.com/ks1686/genv
    build-environment:
      - CGO_ENABLED=0
    override-build: |
      go build -v -o $SNAPCRAFT_PART_INSTALL/bin/genv -ldflags="-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
      snapcraftctl set-version-full "{{.Version}}-{{.FullCommit}}"
